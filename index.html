<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Timeline Viewer</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header & Controls */
        header {
            background: #1e293b;
            color: white;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
        }

        button {
            padding: 10px 20px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        /* The Horizontal Timeline Strip */
        #timeline {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 40px 20px;
            flex: 1;
            align-items: flex-start;
            scroll-behavior: smooth;
        }

        /* Individual Snapshot Card */
        .snap-card {
            min-width: 350px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
        }

        .snap-card:hover {
            transform: translateY(-5px);
        }

        .snap-header {
            background: #f1f5f9;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #e2e8f0;
            color: #475569;
        }

        iframe {
            width: 100%;
            height: 500px;
            border: none;
            background: white;
        }

        .status-msg {
            text-align: center;
            margin-top: 50px;
            color: #64748b;
            font-size: 1.2rem;
        }

        /* Scrollbar Styling */
        #timeline::-webkit-scrollbar {
            height: 10px;
        }
        #timeline::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>Web History Explorer</h1>
    <div class="controls">
        <input type="text" id="urlInput" placeholder="Enter URL (e.g. apple.com)" value="google.com">
        <input type="month" id="monthPicker" value="2024-01">
        <button onclick="fetchSnapshots()">Fetch Monthly Snaps</button>
    </div>
</header>

<div id="timeline">
    <div class="status-msg">Enter a URL and click 'Fetch' to see the timeline...</div>
</div>

<script>
    async function fetchSnapshots() {
        const url = document.getElementById('urlInput').value.trim();
        const monthVal = document.getElementById('monthPicker').value;
        const timeline = document.getElementById('timeline');

        if (!url) {
            alert("Please enter a URL");
            return;
        }

        // 1. Prepare Date Range (YYYYMMDD)
        const [year, month] = monthVal.split('-');
        const fromDate = `${year}${month}01`;
        const toDate = `${year}${month}31`;

        timeline.innerHTML = '<div class="status-msg">Searching the archives...</div>';

        try {
            // 2. Call Wayback CDX API
            // collapse=timestamp:8 ensures one snap per day (YYYYMMDD)
            const apiUrl = `https://web.archive.org/cdx/search/cdx?url=${encodeURIComponent(url)}&from=${fromDate}&to=${toDate}&output=json&collapse=timestamp:8&filter=statuscode:200`;
            
            const response = await fetch(apiUrl);
            const data = await response.json();

            // Check if results exist (index 0 is headers, so length must be > 1)
            if (data.length <= 1) {
                timeline.innerHTML = '<div class="status-msg">No snapshots found for this month. Try an older date!</div>';
                return;
            }

            timeline.innerHTML = ''; // Clear status message

            // 3. Process Data (Skip headers at index 0)
            data.slice(1).forEach(row => {
                const timestamp = row[1];
                const originalUrl = row[2];
                
                // Format date for display: DD-MM-YYYY
                const day = timestamp.substring(6,8);
                const mon = timestamp.substring(4,6);
                const yr = timestamp.substring(0,4);
                const displayDate = `${day}-${mon}-${yr}`;

                // Create the Card UI
                const card = document.createElement('div');
                card.className = 'snap-card';
                
                // We use the 'id_' suffix in the URL to get the RAW view (no Wayback header)
                const archiveUrl = `https://web.archive.org/web/${timestamp}id_/${originalUrl}`;

                card.innerHTML = `
                    <div class="snap-header">Date: ${displayDate}</div>
                    <iframe src="${archiveUrl}" loading="lazy"></iframe>
                    <div class="snap-header" style="font-size: 0.8rem; background: #fff;">
                        <a href="https://web.archive.org/web/${timestamp}/${originalUrl}" target="_blank">Open Full Archive ↗</a>
                    </div>
                `;
                
                timeline.appendChild(card);
            });

        } catch (error) {
            console.error(error);
            timeline.innerHTML = '<div class="status-msg">Error connecting to Wayback Machine. Please try again.</div>';
        }
    }
</script>

</body>
</html>
