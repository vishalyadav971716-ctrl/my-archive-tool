<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web History Explorer</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: #1e293b;
            color: white;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            z-index: 10;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
        }

        button {
            padding: 10px 20px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        #timeline {
            display: flex;
            overflow-x: auto;
            gap: 25px;
            padding: 40px 30px;
            flex: 1;
            align-items: flex-start;
            scroll-behavior: smooth;
            background: #e2e8f0;
        }

        .snap-card {
            min-width: 400px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #cbd5e1;
        }

        .date-label {
            background: #334155;
            color: white;
            padding: 12px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
        }

        iframe {
            width: 100%;
            height: 550px;
            border: none;
            background: white;
        }

        .status-msg {
            width: 100%;
            text-align: center;
            margin-top: 100px;
            color: #475569;
            font-size: 1.3rem;
            font-weight: 500;
        }

        #timeline::-webkit-scrollbar { height: 12px; }
        #timeline::-webkit-scrollbar-track { background: #f1f5f9; }
        #timeline::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Web History Explorer</h1>
    <div class="controls">
        <input type="text" id="urlInput" placeholder="Enter URL (e.g. apple.com)" value="google.com">
        <input type="month" id="monthPicker" value="2020-01">
        <button onclick="fetchSnapshots()">Fetch Monthly Snaps</button>
    </div>
</header>

<div id="timeline">
    <div class="status-msg">Enter a URL and select a month to start exploring...</div>
</div>

<script>
    async function fetchSnapshots() {
        const url = document.getElementById('urlInput').value.trim().replace(/^https?:\/\//, '');
        const monthVal = document.getElementById('monthPicker').value;
        const timeline = document.getElementById('timeline');

        if (!url) { alert("Please enter a URL"); return; }

        const [year, month] = monthVal.split('-');
        const fromDate = `${year}${month}01`;
        const toDate = `${year}${month}31`;

        timeline.innerHTML = '<div class="status-msg">Searching the archives via Proxy...</div>';

        try {
            // Updated API URL using CORSProxy.io to bypass browser blocks
            const waybackUrl = `https://web.archive.org/cdx/search/cdx?url=${encodeURIComponent(url)}&from=${fromDate}&to=${toDate}&output=json&collapse=timestamp:8&filter=statuscode:200`;
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(waybackUrl)}`;
            
            const response = await fetch(proxyUrl);
            const data = await response.json();

            if (data.length <= 1) {
                timeline.innerHTML = '<div class="status-msg">No snapshots found for this specific month. Try another year!</div>';
                return;
            }

            timeline.innerHTML = ''; 

            data.slice(1).forEach(row => {
                const timestamp = row[1];
                const originalUrl = row[2];
                
                // Format: DD MMM YYYY
                const dateObj = new Date(timestamp.substring(0,4), timestamp.substring(4,6)-1, timestamp.substring(6,8));
                const displayDate = dateObj.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });

                const card = document.createElement('div');
                card.className = 'snap-card';
                
                // 'id_' provides the clean version without the top Wayback banner
                const archiveUrl = `https://web.archive.org/web/${timestamp}id_/${originalUrl}`;

                card.innerHTML = `
                    <div class="date-label">${displayDate}</div>
                    <iframe src="${archiveUrl}" loading="lazy"></iframe>
                `;
                
                timeline.appendChild(card);
            });

        } catch (error) {
            console.error(error);
            timeline.innerHTML = '<div class="status-msg">Connection failed. The Wayback Machine might be busy or the URL is invalid.</div>';
        }
    }
</script>

</body>
</html>
